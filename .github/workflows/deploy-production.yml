name: Deploy Production

on:
  pull_request:
    branches:
      - prod
  push:
    branches:
      - prod
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify Production Build
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      VERCEL_ENV: production
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export production database environment
        shell: bash
        run: |
          if [[ -z "${PAYLOAD_SECRET}" ]]; then
            echo "::error::Missing secret PAYLOAD_SECRET for production verification."
            exit 1
          fi
          if [[ -z "${PRODUCTION_DATABASE_URL}" ]]; then
            echo "::error::Missing secret PRODUCTION_DATABASE_URL for production verification."
            exit 1
          fi
          echo "PROD_POSTGRES_URL=${PRODUCTION_DATABASE_URL}" >> "${GITHUB_ENV}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        run: pnpm test:int

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Production
    needs: verify
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Check Vercel token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [[ -z "${VERCEL_TOKEN}" ]]; then
            echo "::error::Missing secret VERCEL_TOKEN for production deploy."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
