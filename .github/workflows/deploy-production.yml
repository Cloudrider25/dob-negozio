name: Deploy Production

on:
  pull_request:
    branches:
      - prod
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  verify:
    name: Verify Production Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        shell: bash
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          export VERCEL_ENV=production
          pnpm test:int
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Build
        shell: bash
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          export VERCEL_ENV=production
          pnpm build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Production
    needs: verify
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
