name: Deploy Production

on:
  pull_request:
    branches:
      - prod
  push:
    branches:
      - prod
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify Production Build
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      VERCEL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Export Vercel production environment
        shell: bash
        run: |
          if [[ ! -f .vercel/.env.production.local ]]; then
            echo "::error::Missing .vercel/.env.production.local after vercel pull."
            exit 1
          fi
          ENV_FILE=".vercel/.env.production.local" DB_KEY="PROD_POSTGRES_URL" GITHUB_ENV="${GITHUB_ENV}" node --input-type=module <<'EOF'
          import fs from 'node:fs'
          import dotenv from 'dotenv'

          const parsed = dotenv.parse(fs.readFileSync(process.env.ENV_FILE))
          const candidates = ['PROD_POSTGRES_URL', 'PROD_DATABASE_URL', 'PRODUCTION_DATABASE_URL', 'DATABASE_URL', 'POSTGRES_URL']
          const lines = Object.entries(parsed).map(([key, value]) => `${key}=${value}`)
          const selected = candidates.map((key) => parsed[key]?.trim()).find(Boolean)

          if (!selected) {
            console.error('::error::Production environment does not expose any production database URL.')
            process.exit(1)
          }

          lines.push(`PROD_POSTGRES_URL=${selected}`)
          fs.appendFileSync(process.env.GITHUB_ENV, `${lines.join('\n')}\n`)
          EOF

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        run: pnpm test:int
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Production
    needs: verify
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Check Vercel token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [[ -z "${VERCEL_TOKEN}" ]]; then
            echo "::error::Missing secret VERCEL_TOKEN for production deploy."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
