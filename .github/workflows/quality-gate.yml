name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - dev
      - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  static-checks:
    name: Lint + Typecheck + Int Tests
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target environment
        shell: bash
        run: |
          if [[ "${GITHUB_BASE_REF}" == "prod" || "${GITHUB_REF_NAME}" == "prod" ]]; then
            echo "APP_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=production" >> "${GITHUB_ENV}"
          else
            echo "APP_ENV=staging" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=preview" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=preview" >> "${GITHUB_ENV}"
          fi

      - name: Export target database environment
        shell: bash
        run: |
          if [[ "${APP_ENV}" == "production" ]]; then
            if [[ -z "${PRODUCTION_DATABASE_URL}" ]]; then
              echo "::error::Missing secret PRODUCTION_DATABASE_URL for production quality gate."
              exit 1
            fi
            echo "PROD_POSTGRES_URL=${PRODUCTION_DATABASE_URL}" >> "${GITHUB_ENV}"
          else
            if [[ -z "${STAGING_DATABASE_URL}" ]]; then
              echo "::error::Missing secret STAGING_DATABASE_URL for staging quality gate."
              exit 1
            fi
            echo "STG_POSTGRES_URL=${STAGING_DATABASE_URL}" >> "${GITHUB_ENV}"
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate staging DB secrets
        shell: bash
        run: |
          if [[ -z "${PAYLOAD_SECRET}" ]]; then
            echo "::error::Missing secret PAYLOAD_SECRET for Quality Gate."
            exit 1
          fi
          if [[ "${APP_ENV}" == "production" ]]; then
            if [[ -z "${PROD_POSTGRES_URL}" ]]; then
              echo "::error::Missing production database URL after Vercel environment pull."
              exit 1
            fi
          else
            if [[ -z "${STG_POSTGRES_URL}" ]]; then
              echo "::error::Missing staging database URL after Vercel environment pull."
              exit 1
            fi
          fi

      - name: Integration tests
        run: pnpm test:int

  e2e-smoke:
    name: E2E Smoke
    needs: static-checks
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target environment
        shell: bash
        run: |
          if [[ "${GITHUB_BASE_REF}" == "prod" || "${GITHUB_REF_NAME}" == "prod" ]]; then
            echo "APP_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=production" >> "${GITHUB_ENV}"
          else
            echo "APP_ENV=staging" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=preview" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=preview" >> "${GITHUB_ENV}"
          fi

      - name: Export target database environment
        shell: bash
        run: |
          if [[ "${APP_ENV}" == "production" ]]; then
            if [[ -z "${PRODUCTION_DATABASE_URL}" ]]; then
              echo "::error::Missing secret PRODUCTION_DATABASE_URL for production quality gate."
              exit 1
            fi
            echo "PROD_POSTGRES_URL=${PRODUCTION_DATABASE_URL}" >> "${GITHUB_ENV}"
          else
            if [[ -z "${STAGING_DATABASE_URL}" ]]; then
              echo "::error::Missing secret STAGING_DATABASE_URL for staging quality gate."
              exit 1
            fi
            echo "STG_POSTGRES_URL=${STAGING_DATABASE_URL}" >> "${GITHUB_ENV}"
          fi

      - name: Check required secrets
        id: secrets-check
        shell: bash
        run: |
          if [[ -n "${PAYLOAD_SECRET}" ]]; then
            echo "has_secrets=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_secrets=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip smoke when secrets are missing
        if: steps.secrets-check.outputs.has_secrets != 'true'
        run: |
          echo "Skipping smoke E2E: PAYLOAD_SECRET not configured."

      - name: Install Playwright browser
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app for smoke E2E
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: pnpm build

      - name: Run smoke E2E
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: pnpm test:e2e:smoke
