name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - dev
      - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  static-checks:
    name: Lint + Typecheck + Int Tests
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
      VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target environment
        shell: bash
        run: |
          if [[ "${GITHUB_BASE_REF}" == "prod" || "${GITHUB_REF_NAME}" == "prod" ]]; then
            echo "APP_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=production" >> "${GITHUB_ENV}"
          else
            echo "APP_ENV=staging" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=preview" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=preview" >> "${GITHUB_ENV}"
          fi

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment="${VERCEL_PULL_ENV}" --token="${VERCEL_TOKEN}"

      - name: Export pulled environment
        shell: bash
        run: |
          if [[ "${VERCEL_PULL_ENV}" == "production" ]]; then
            env_file=".vercel/.env.production.local"
            db_pattern='^(PROD_POSTGRES_URL|PROD_DATABASE_URL|PRODUCTION_DATABASE_URL|DATABASE_URL|POSTGRES_URL)='
            db_key="PROD_POSTGRES_URL"
          else
            env_file=".vercel/.env.preview.local"
            db_pattern='^(STG_POSTGRES_URL|STG_DATABASE_URL|STAGING_DATABASE_URL|DATABASE_URL|POSTGRES_URL)='
            db_key="STG_POSTGRES_URL"
          fi

          if [[ ! -f "${env_file}" ]]; then
            echo "::error::Missing ${env_file} after vercel pull."
            exit 1
          fi

          grep -v '^[#[:space:]]' "${env_file}" >> "${GITHUB_ENV}"
          db_line="$(grep -E "${db_pattern}" "${env_file}" | head -n 1 || true)"
          if [[ -z "${db_line}" ]]; then
            echo "::error::Pulled Vercel environment does not expose a compatible database URL."
            exit 1
          fi
          echo "${db_key}=${db_line#*=}" >> "${GITHUB_ENV}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate staging DB secrets
        shell: bash
        run: |
          if [[ -z "${PAYLOAD_SECRET}" ]]; then
            echo "::error::Missing secret PAYLOAD_SECRET for Quality Gate."
            exit 1
          fi
          if [[ "${APP_ENV}" == "production" ]]; then
            if [[ -z "${PROD_POSTGRES_URL}" ]]; then
              echo "::error::Missing production database URL after Vercel environment pull."
              exit 1
            fi
          else
            if [[ -z "${STG_POSTGRES_URL}" ]]; then
              echo "::error::Missing staging database URL after Vercel environment pull."
              exit 1
            fi
          fi

      - name: Integration tests
        run: pnpm test:int

  e2e-smoke:
    name: E2E Smoke
    needs: static-checks
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
      VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target environment
        shell: bash
        run: |
          if [[ "${GITHUB_BASE_REF}" == "prod" || "${GITHUB_REF_NAME}" == "prod" ]]; then
            echo "APP_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=production" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=production" >> "${GITHUB_ENV}"
          else
            echo "APP_ENV=staging" >> "${GITHUB_ENV}"
            echo "VERCEL_ENV=preview" >> "${GITHUB_ENV}"
            echo "VERCEL_PULL_ENV=preview" >> "${GITHUB_ENV}"
          fi

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment="${VERCEL_PULL_ENV}" --token="${VERCEL_TOKEN}"

      - name: Export pulled environment
        shell: bash
        run: |
          if [[ "${VERCEL_PULL_ENV}" == "production" ]]; then
            env_file=".vercel/.env.production.local"
            db_pattern='^(PROD_POSTGRES_URL|PROD_DATABASE_URL|PRODUCTION_DATABASE_URL|DATABASE_URL|POSTGRES_URL)='
            db_key="PROD_POSTGRES_URL"
          else
            env_file=".vercel/.env.preview.local"
            db_pattern='^(STG_POSTGRES_URL|STG_DATABASE_URL|STAGING_DATABASE_URL|DATABASE_URL|POSTGRES_URL)='
            db_key="STG_POSTGRES_URL"
          fi

          if [[ ! -f "${env_file}" ]]; then
            echo "::error::Missing ${env_file} after vercel pull."
            exit 1
          fi

          grep -v '^[#[:space:]]' "${env_file}" >> "${GITHUB_ENV}"
          db_line="$(grep -E "${db_pattern}" "${env_file}" | head -n 1 || true)"
          if [[ -z "${db_line}" ]]; then
            echo "::error::Pulled Vercel environment does not expose a compatible database URL."
            exit 1
          fi
          echo "${db_key}=${db_line#*=}" >> "${GITHUB_ENV}"

      - name: Check required secrets
        id: secrets-check
        shell: bash
        run: |
          if [[ -n "${PAYLOAD_SECRET}" ]]; then
            echo "has_secrets=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_secrets=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip smoke when secrets are missing
        if: steps.secrets-check.outputs.has_secrets != 'true'
        run: |
          echo "Skipping smoke E2E: PAYLOAD_SECRET not configured."

      - name: Install Playwright browser
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke E2E
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: pnpm test:e2e:smoke
