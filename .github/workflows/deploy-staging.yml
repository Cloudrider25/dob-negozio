name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify Staging Build
    runs-on: ubuntu-latest
    env:
      APP_ENV: staging
      VERCEL_ENV: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel preview environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Export Vercel preview environment
        shell: bash
        run: |
          if [[ ! -f .vercel/.env.preview.local ]]; then
            echo "::error::Missing .vercel/.env.preview.local after vercel pull."
            exit 1
          fi
          grep -v '^[#[:space:]]' .vercel/.env.preview.local >> "${GITHUB_ENV}"
          db_line="$(grep -E '^(STG_POSTGRES_URL|STG_DATABASE_URL|STAGING_DATABASE_URL|DATABASE_URL|POSTGRES_URL)=' .vercel/.env.preview.local | head -n 1 || true)"
          if [[ -z "${db_line}" ]]; then
            echo "::error::Preview environment does not expose any staging database URL."
            exit 1
          fi
          echo "STG_POSTGRES_URL=${db_line#*=}" >> "${GITHUB_ENV}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        run: pnpm test:int
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Staging
    needs: verify
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Check deploy hook
        id: deploy-hook
        shell: bash
        env:
          DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [[ -n "${DEPLOY_HOOK_URL}" ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger staging deploy webhook
        if: steps.deploy-hook.outputs.ready == 'true'
        run: curl -fsS -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"

      - name: No deploy hook configured
        if: steps.deploy-hook.outputs.ready != 'true'
        run: echo "STAGING_DEPLOY_HOOK_URL non configurato. Verifica completata, deploy non eseguito."
