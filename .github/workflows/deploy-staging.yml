name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify Staging Build
    runs-on: ubuntu-latest
    env:
      APP_ENV: staging
      VERCEL_ENV: preview
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export staging database environment
        shell: bash
        run: |
          if [[ -z "${PAYLOAD_SECRET}" ]]; then
            echo "::error::Missing secret PAYLOAD_SECRET for staging verification."
            exit 1
          fi
          if [[ -z "${STAGING_DATABASE_URL}" ]]; then
            echo "::error::Missing secret STAGING_DATABASE_URL for staging verification."
            exit 1
          fi
          echo "STG_POSTGRES_URL=${STAGING_DATABASE_URL}" >> "${GITHUB_ENV}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        run: pnpm test:int

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Staging
    needs: verify
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Check deploy hook
        id: deploy-hook
        shell: bash
        env:
          DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [[ -n "${DEPLOY_HOOK_URL}" ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger staging deploy webhook
        if: steps.deploy-hook.outputs.ready == 'true'
        run: curl -fsS -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"

      - name: No deploy hook configured
        if: steps.deploy-hook.outputs.ready != 'true'
        run: echo "STAGING_DEPLOY_HOOK_URL non configurato. Verifica completata, deploy non eseguito."
