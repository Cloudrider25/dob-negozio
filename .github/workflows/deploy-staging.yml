name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify Staging Build
    runs-on: ubuntu-latest
    env:
      APP_ENV: staging
      VERCEL_ENV: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel preview environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AyjMkUgQ9PfWcNNzfaMtAS7C
          VERCEL_PROJECT_ID: prj_aYRziHKjjAAnQBhQpmvlIVbRjBpR
        run: pnpm dlx vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Export Vercel preview environment
        shell: bash
        run: |
          if [[ ! -f .vercel/.env.preview.local ]]; then
            echo "::error::Missing .vercel/.env.preview.local after vercel pull."
            exit 1
          fi
          ENV_FILE=".vercel/.env.preview.local" DB_KEY="STG_POSTGRES_URL" GITHUB_ENV="${GITHUB_ENV}" node --input-type=module <<'EOF'
          import fs from 'node:fs'
          import dotenv from 'dotenv'

          const parsed = dotenv.parse(fs.readFileSync(process.env.ENV_FILE))
          const candidates = ['STG_POSTGRES_URL', 'STG_DATABASE_URL', 'STAGING_DATABASE_URL', 'DATABASE_URL', 'POSTGRES_URL']
          const lines = Object.entries(parsed).map(([key, value]) => `${key}=${value}`)
          const selected = candidates.map((key) => parsed[key]?.trim()).find(Boolean)

          if (!selected) {
            console.error('::error::Preview environment does not expose any staging database URL.')
            process.exit(1)
          }

          lines.push(`STG_POSTGRES_URL=${selected}`)
          fs.appendFileSync(process.env.GITHUB_ENV, `${lines.join('\n')}\n`)
          EOF

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        run: pnpm test:int
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Staging
    needs: verify
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Check deploy hook
        id: deploy-hook
        shell: bash
        env:
          DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [[ -n "${DEPLOY_HOOK_URL}" ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger staging deploy webhook
        if: steps.deploy-hook.outputs.ready == 'true'
        run: curl -fsS -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"

      - name: No deploy hook configured
        if: steps.deploy-hook.outputs.ready != 'true'
        run: echo "STAGING_DEPLOY_HOOK_URL non configurato. Verifica completata, deploy non eseguito."
