name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  verify:
    name: Verify Staging Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Integration tests
        run: pnpm test:int
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Deploy Staging
    needs: verify
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Check deploy hook
        id: deploy-hook
        shell: bash
        env:
          DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [[ -n "${DEPLOY_HOOK_URL}" ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger staging deploy webhook
        if: steps.deploy-hook.outputs.ready == 'true'
        run: curl -fsS -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"

      - name: No deploy hook configured
        if: steps.deploy-hook.outputs.ready != 'true'
        run: echo "STAGING_DEPLOY_HOOK_URL non configurato. Verifica completata, deploy non eseguito."
